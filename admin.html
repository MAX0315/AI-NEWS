<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>个人主页后台控制台</title>
    <style>
      :root {
        --ink: #161c1f;
        --muted: #647077;
        --paper: #f7f9f8;
        --surface: rgba(255, 255, 255, 0.86);
        --line: rgba(22, 28, 31, 0.13);
        --accent: #183134;
        --accent-2: #4b7470;
        --accent-soft: #d9e6e2;
        --danger: #9b3d33;
        --shadow: 0 22px 58px rgba(25, 34, 38, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        color: var(--ink);
        background:
          linear-gradient(rgba(247, 249, 248, 0.93), rgba(247, 249, 248, 0.97)),
          url("assets/images/background-paper-texture.png"),
          var(--paper);
        font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif;
        line-height: 1.65;
      }

      a {
        color: inherit;
      }

      code {
        color: var(--accent);
        font-family: "Cascadia Code", Consolas, monospace;
      }

      .shell {
        width: min(1520px, calc(100% - 32px));
        margin: 0 auto;
        padding: 22px 0 38px;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 14px 0;
        background: rgba(247, 249, 248, 0.92);
        backdrop-filter: blur(18px);
      }

      .brand h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0;
      }

      .brand p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
      }

      button,
      .button-link {
        min-height: 42px;
        padding: 0 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        font: inherit;
        font-size: 14px;
        font-weight: 800;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .button-link.accent {
        border-color: rgba(75, 116, 112, 0.35);
        background: var(--accent-soft);
        color: var(--accent);
      }

      button.ghost {
        background: transparent;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.62;
      }

      .notice {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 14px;
        align-items: center;
        margin: 14px 0 18px;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--accent-soft);
        color: #243739;
        font-size: 14px;
      }

      .notice strong {
        color: var(--accent);
      }

      .quick-panel {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin: 0 0 18px;
      }

      .quick-card {
        display: grid;
        gap: 4px;
        min-height: 82px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.86);
        color: var(--ink);
        text-decoration: none;
        box-shadow: var(--shadow);
      }

      .quick-card strong {
        font-size: 15px;
      }

      .quick-card span {
        color: var(--muted);
        font-size: 13px;
      }

      .quick-card.is-image {
        border-color: rgba(75, 116, 112, 0.34);
        background: var(--accent-soft);
      }

      .image-field {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: end;
      }

      .image-field label {
        min-width: 0;
      }

      .image-field button {
        min-height: 42px;
        white-space: nowrap;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(420px, 0.92fr) minmax(520px, 1.08fr);
        gap: 18px;
        align-items: start;
      }

      .editor-pane,
      .preview-pane {
        min-width: 0;
      }

      .tabs {
        position: sticky;
        top: 76px;
        z-index: 12;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .tabs a {
        padding: 8px 10px;
        border-radius: 6px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
        text-decoration: none;
      }

      .tabs a:hover,
      .tabs a.is-active {
        background: var(--accent-soft);
        color: var(--accent);
      }

      .sections {
        display: grid;
        gap: 14px;
        margin-top: 14px;
      }

      section,
      .preview-card {
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      section h2,
      .preview-card h2 {
        margin: 0 0 14px;
        font-size: 18px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      label {
        display: grid;
        gap: 7px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
        color: var(--ink);
        font: inherit;
        font-size: 15px;
        outline: none;
      }

      input:focus,
      textarea:focus {
        border-color: rgba(75, 116, 112, 0.55);
        box-shadow: 0 0 0 3px rgba(75, 116, 112, 0.12);
      }

      input {
        min-height: 42px;
        padding: 8px 12px;
      }

      textarea {
        min-height: 108px;
        padding: 10px 12px;
        resize: vertical;
      }

      textarea.code {
        min-height: 230px;
        font-family: "Cascadia Code", Consolas, monospace;
        font-size: 13px;
        line-height: 1.55;
      }

      .wide {
        grid-column: 1 / -1;
      }

      .status {
        position: sticky;
        bottom: 14px;
        z-index: 18;
        min-height: 42px;
        margin: 14px 0 0;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        color: var(--muted);
        white-space: pre-wrap;
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .status[data-tone="ok"] {
        color: var(--accent);
      }

      .status[data-tone="error"] {
        color: var(--danger);
      }

      .preview-pane {
        position: sticky;
        top: 76px;
      }

      .preview-card {
        padding: 0;
        overflow: hidden;
      }

      .preview-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.78);
      }

      .preview-head h2 {
        margin: 0;
        font-size: 16px;
      }

      .preview-tools {
        display: flex;
        gap: 8px;
      }

      .viewport {
        width: 100%;
        height: calc(100vh - 172px);
        min-height: 560px;
        border: 0;
        background: #fff;
      }

      .preview-card.is-mobile .viewport {
        display: block;
        width: 390px;
        max-width: calc(100% - 28px);
        height: 720px;
        min-height: 720px;
        margin: 14px auto;
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      @media (max-width: 1100px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        .preview-pane {
          position: static;
        }
      }

      @media (max-width: 760px) {
        .shell {
          width: min(100% - 20px, 1520px);
        }

        .topbar,
        .notice {
          display: block;
        }

        .quick-panel {
          grid-template-columns: 1fr;
        }

        .actions {
          justify-content: flex-start;
          margin-top: 12px;
        }

        .workspace {
          display: block;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .preview-pane {
          margin-top: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <h1>个人主页后台控制台</h1>
          <p>左侧修改内容，右侧实时预览；保存后写入 <code>site-content.json</code>，推送后同步到 Netlify 生产站。</p>
        </div>
        <div class="actions">
          <button type="button" id="syncPreviewButton">同步预览</button>
          <a class="button-link accent" href="#images" id="imageShortcutButton">修改图片</a>
          <button type="button" id="saveButton">保存内容</button>
          <button class="primary" type="button" id="publishButton">保存并推送</button>
        </div>
      </header>

      <div class="notice">
        <div>
          <strong>本地控制台：</strong>请在项目目录运行 <code>node admin-server.js</code> 后使用本页面。公网不变时，优先用右侧“强制刷新公网”打开带时间戳的链接。
        </div>
        <a class="button-link" href="https://flourishing-sprite-5edd07.netlify.app/" target="_blank" rel="noopener">打开公网主页</a>
      </div>

      <div class="quick-panel" aria-label="常用编辑入口">
        <a class="quick-card" href="#basic">
          <strong>修改首页文字</strong>
          <span>主标题、说明、品牌名称</span>
        </a>
        <a class="quick-card is-image" href="#images">
          <strong>修改网页图片</strong>
          <span>首屏图、关于图、联系图、文章图</span>
        </a>
        <a class="quick-card" href="#contact">
          <strong>修改联系入口</strong>
          <span>邮箱、电话、站酷、社交链接</span>
        </a>
      </div>

      <div class="workspace">
        <div class="editor-pane">
          <nav class="tabs" aria-label="后台栏目">
            <a class="is-active" href="#basic">基础</a>
            <a href="#hero">首屏</a>
            <a href="#sections">栏目</a>
            <a href="#contact">联系</a>
            <a href="#images">图片</a>
          </nav>

          <main class="sections">
            <section id="basic">
              <h2>基础信息</h2>
              <div class="grid">
                <label>品牌名称 <input data-path="brand.name" /></label>
                <label>身份标签 <input data-path="brand.role" /></label>
                <label>首页可见主标题，换行用回车 <textarea data-path="hero.title" data-array-lines></textarea></label>
                <label>首页可见说明 <textarea data-path="hero.lede"></textarea></label>
                <label>浏览器标签标题，不显示在页面正文 <input data-path="meta.title" /></label>
                <label>搜索描述，不显示在页面正文 <input data-path="meta.description" /></label>
              </div>
            </section>

            <section id="hero">
              <h2>首屏内容</h2>
              <div class="grid">
                <label>小标题 <input data-path="hero.eyebrow" /></label>
                <label>按钮 1 文案 <input data-path="hero.actions.0.label" /></label>
                <label>按钮 1 链接 <input data-path="hero.actions.0.href" /></label>
                <label>按钮 2 文案 <input data-path="hero.actions.1.label" /></label>
                <label>按钮 2 链接 <input data-path="hero.actions.1.href" /></label>
                <label>按钮 3 文案 <input data-path="hero.actions.2.label" /></label>
                <label>按钮 3 链接 <input data-path="hero.actions.2.href" /></label>
                <label>数据 1 数字 <input data-path="hero.signals.0.value" /></label>
                <label>数据 1 说明 <input data-path="hero.signals.0.label" /></label>
                <label>数据 2 数字 <input data-path="hero.signals.1.value" /></label>
                <label>数据 2 说明 <input data-path="hero.signals.1.label" /></label>
                <label>数据 3 数字 <input data-path="hero.signals.2.value" /></label>
                <label>数据 3 说明 <input data-path="hero.signals.2.label" /></label>
              </div>
            </section>

            <section id="sections">
              <h2>栏目内容</h2>
              <div class="grid">
                <label>内容方向标题 <input data-path="topicsSection.title" /></label>
                <label>内容方向说明 <textarea data-path="topicsSection.body"></textarea></label>
                <label>精选文章说明 <textarea data-path="writingSection.body"></textarea></label>
                <label>关于我标题 <input data-path="about.title" /></label>
                <label>关于我正文，分段用回车 <textarea data-path="about.paragraphs" data-array-lines></textarea></label>
                <label>内容方法标题 <input data-path="methodSection.title" /></label>
                <label>内容方法说明 <textarea data-path="methodSection.body"></textarea></label>
                <label>方向 1 标题 <input data-path="topics.0.title" /></label>
                <label>方向 1 说明 <textarea data-path="topics.0.body"></textarea></label>
                <label>方向 2 标题 <input data-path="topics.1.title" /></label>
                <label>方向 2 说明 <textarea data-path="topics.1.body"></textarea></label>
                <label>方向 3 标题 <input data-path="topics.2.title" /></label>
                <label>方向 3 说明 <textarea data-path="topics.2.body"></textarea></label>
                <label>方向 4 标题 <input data-path="topics.3.title" /></label>
                <label>方向 4 说明 <textarea data-path="topics.3.body"></textarea></label>
                <label>方向 5 标题 <input data-path="topics.4.title" /></label>
                <label>方向 5 说明 <textarea data-path="topics.4.body"></textarea></label>
                <label>方向 6 标题 <input data-path="topics.5.title" /></label>
                <label>方向 6 说明 <textarea data-path="topics.5.body"></textarea></label>
                <label>文章 1 栏目 <input data-path="articles.0.meta" /></label>
                <label>文章 1 标题 <input data-path="articles.0.title" /></label>
                <label>文章 1 摘要 <textarea data-path="articles.0.body"></textarea></label>
                <label>文章 1 状态 <input data-path="articles.0.state" /></label>
                <label>文章 1 链接 <input data-path="articles.0.href" /></label>
                <label>文章 2 栏目 <input data-path="articles.1.meta" /></label>
                <label>文章 2 标题 <input data-path="articles.1.title" /></label>
                <label>文章 2 摘要 <textarea data-path="articles.1.body"></textarea></label>
                <label>文章 2 状态 <input data-path="articles.1.state" /></label>
                <label>文章 2 链接 <input data-path="articles.1.href" /></label>
                <label>文章 3 栏目 <input data-path="articles.2.meta" /></label>
                <label>文章 3 标题 <input data-path="articles.2.title" /></label>
                <label>文章 3 摘要 <textarea data-path="articles.2.body"></textarea></label>
                <label>文章 3 状态 <input data-path="articles.2.state" /></label>
                <label>文章 3 链接 <input data-path="articles.2.href" /></label>
                <label>数据 1 数值 <input data-path="metrics.0.value" inputmode="numeric" /></label>
                <label>数据 1 说明 <input data-path="metrics.0.label" /></label>
                <label>数据 2 数值 <input data-path="metrics.1.value" inputmode="numeric" /></label>
                <label>数据 2 说明 <input data-path="metrics.1.label" /></label>
                <label>数据 3 数值 <input data-path="metrics.2.value" inputmode="numeric" /></label>
                <label>数据 3 说明 <input data-path="metrics.2.label" /></label>
                <label>数据 4 数值 <input data-path="metrics.3.value" inputmode="numeric" /></label>
                <label>数据 4 说明 <input data-path="metrics.3.label" /></label>
              </div>
            </section>

            <section id="contact">
              <h2>联系与弹窗</h2>
              <div class="grid">
                <label>联系区标题 <input data-path="contact.title" /></label>
                <label>联系区说明 <textarea data-path="contact.body"></textarea></label>
                <label>按钮文案 <input data-path="contact.buttonLabel" /></label>
                <label>弹窗标题 <input data-path="exchange.title" /></label>
                <label>弹窗说明 <textarea data-path="exchange.note"></textarea></label>
                <label>联系入口 1 文案 <input data-path="contact.links.0.label" /></label>
                <label>联系入口 1 链接 <input data-path="contact.links.0.href" /></label>
                <label>联系入口 2 文案 <input data-path="contact.links.1.label" /></label>
                <label>联系入口 2 链接 <input data-path="contact.links.1.href" /></label>
                <label>联系入口 3 文案 <input data-path="contact.links.2.label" /></label>
                <label>联系入口 3 链接 <input data-path="contact.links.2.href" /></label>
                <label>联系入口 4 文案 <input data-path="contact.links.3.label" /></label>
                <label>联系入口 4 链接 <input data-path="contact.links.3.href" /></label>
                <label>联系入口 5 文案 <input data-path="contact.links.4.label" /></label>
                <label>联系入口 5 链接 <input data-path="contact.links.4.href" /></label>
              </div>
            </section>

            <section id="images">
              <h2>图片设置</h2>
              <div class="grid">
                <div class="image-field">
                  <label>首屏主图 <input data-path="images.hero.src" list="imageOptions" placeholder="assets/images/hero-symmetric-ai-studio.png" /></label>
                  <button type="button" data-upload-target="images.hero.src">上传图片</button>
                </div>
                <label>首屏主图说明 <input data-path="images.hero.alt" /></label>
                <div class="image-field">
                  <label>关于我图片 <input data-path="images.about.src" list="imageOptions" placeholder="assets/images/about-creative-work.png" /></label>
                  <button type="button" data-upload-target="images.about.src">上传图片</button>
                </div>
                <label>关于我图片说明 <input data-path="images.about.alt" /></label>
                <div class="image-field">
                  <label>联系区图片 <input data-path="images.contact.src" list="imageOptions" placeholder="assets/images/contact-quiet-connection.png" /></label>
                  <button type="button" data-upload-target="images.contact.src">上传图片</button>
                </div>
                <label>联系区图片说明 <input data-path="images.contact.alt" /></label>
                <div class="image-field">
                  <label>文章 1 图片 <input data-path="articles.0.image" list="imageOptions" /></label>
                  <button type="button" data-upload-target="articles.0.image">上传图片</button>
                </div>
                <label>文章 1 图片说明 <input data-path="articles.0.alt" /></label>
                <div class="image-field">
                  <label>文章 2 图片 <input data-path="articles.1.image" list="imageOptions" /></label>
                  <button type="button" data-upload-target="articles.1.image">上传图片</button>
                </div>
                <label>文章 2 图片说明 <input data-path="articles.1.alt" /></label>
                <div class="image-field">
                  <label>文章 3 图片 <input data-path="articles.2.image" list="imageOptions" /></label>
                  <button type="button" data-upload-target="articles.2.image">上传图片</button>
                </div>
                <label>文章 3 图片说明 <input data-path="articles.2.alt" /></label>
              </div>
              <datalist id="imageOptions">
                <option value="assets/images/hero-symmetric-ai-studio.png"></option>
                <option value="assets/images/hero-knowledge-studio.png"></option>
                <option value="assets/images/about-creative-work.png"></option>
                <option value="assets/images/contact-quiet-connection.png"></option>
                <option value="assets/images/article-ai-companion-person.png"></option>
                <option value="assets/images/article-ai-companion.png"></option>
                <option value="assets/images/article-engineering-systems.png"></option>
                <option value="assets/images/article-knowledge-archive.png"></option>
              </datalist>
            </section>
          </main>

          <p class="status" id="status" role="status" aria-live="polite"></p>
        </div>

        <aside class="preview-pane" aria-label="实时预览">
          <div class="preview-card" id="previewCard">
            <div class="preview-head">
              <h2>实时预览</h2>
              <div class="preview-tools">
                <button class="ghost" type="button" id="desktopButton">桌面</button>
                <button class="ghost" type="button" id="mobileButton">手机</button>
                <button class="ghost" type="button" id="reloadPreviewButton">刷新预览</button>
                <a class="button-link" id="publicRefreshLink" href="https://flourishing-sprite-5edd07.netlify.app/?refresh=1" target="_blank" rel="noopener">强制刷新公网</a>
              </div>
            </div>
            <iframe class="viewport" id="previewFrame" src="index.html?adminPreview=1" title="个人主页实时预览"></iframe>
          </div>
        </aside>
      </div>
    </div>

    <script>
      let content = {};
      let liveTimer = null;
      let canPublish = false;
      const fields = Array.from(document.querySelectorAll("[data-path]"));
      const statusText = document.querySelector("#status");
      const saveButton = document.querySelector("#saveButton");
      const publishButton = document.querySelector("#publishButton");
      const syncPreviewButton = document.querySelector("#syncPreviewButton");
      const previewFrame = document.querySelector("#previewFrame");
      const previewCard = document.querySelector("#previewCard");
      const reloadPreviewButton = document.querySelector("#reloadPreviewButton");
      const desktopButton = document.querySelector("#desktopButton");
      const mobileButton = document.querySelector("#mobileButton");
      const publicRefreshLink = document.querySelector("#publicRefreshLink");
      const uploadButtons = Array.from(document.querySelectorAll("[data-upload-target]"));

      const setStatus = (message, tone = "") => {
        statusText.textContent = message;
        statusText.dataset.tone = tone;
      };

      const getByPath = (source, path) =>
        path.split(".").reduce((value, key) => (value ? value[key] : undefined), source);

      const setByPath = (target, path, value) => {
        const keys = path.split(".");
        const last = keys.pop();
        const parent = keys.reduce((current, key) => {
          current[key] = current[key] || {};
          return current[key];
        }, target);
        parent[last] = value;
      };

      const fillFields = () => {
        fields.forEach((field) => {
          const value = getByPath(content, field.dataset.path);

          if (field.dataset.arrayLines !== undefined) {
            field.value = Array.isArray(value) ? value.join("\n") : value || "";
            return;
          }

          field.value = value || "";
        });
      };

      const collectFields = () => {
        const nextContent = structuredClone(content);

        fields.forEach((field) => {
          let value = field.value;

          if (field.dataset.arrayLines !== undefined) {
            value = field.value
              .split("\n")
              .map((line) => line.trim())
              .filter(Boolean);
          } else if (field.inputMode === "numeric") {
            const numericValue = Number(field.value);
            value = Number.isFinite(numericValue) ? numericValue : field.value;
          }

          setByPath(nextContent, field.dataset.path, value);
        });

        content = nextContent;
      };

      const sendPreview = () => {
        previewFrame.contentWindow?.postMessage(
          {
            type: "homepage-content-preview",
            content,
          },
          window.location.origin
        );
      };

      const schedulePreview = () => {
        clearTimeout(liveTimer);
        liveTimer = setTimeout(() => {
          try {
            collectFields();
            sendPreview();
            setStatus("已实时同步到右侧预览，保存后才会写入文件。", "ok");
          } catch (error) {
            setStatus(`当前字段格式有误：${error.message}`, "error");
          }
        }, 180);
      };

      const updatePublicRefreshLink = () => {
        publicRefreshLink.href = `https://flourishing-sprite-5edd07.netlify.app/?refresh=${Date.now()}`;
      };

      const chooseImageFile = () =>
        new Promise((resolve) => {
          const input = document.createElement("input");
          input.type = "file";
          input.accept = "image/png,image/jpeg,image/webp,image/svg+xml";
          input.addEventListener(
            "change",
            () => {
              resolve(input.files?.[0] || null);
            },
            { once: true }
          );
          input.click();
        });

      const uploadImageForField = async (path) => {
        if (!canPublish) {
          setStatus("当前是公网只读后台，无法读取并上传本地图片。请使用本地后台：http://127.0.0.1:4315/admin.html", "error");
          return;
        }

        const file = await chooseImageFile();

        if (!file) {
          return;
        }

        const targetField = document.querySelector(`[data-path="${path}"]`);
        setStatus(`正在上传图片：${file.name}...`);

        try {
          const response = await fetch("/api/upload-image", {
            method: "POST",
            headers: {
              "Content-Type": file.type || "application/octet-stream",
              "X-File-Name": encodeURIComponent(file.name),
            },
            body: file,
          });
          const payload = await response.json();

          if (!response.ok || !payload.ok) {
            throw new Error(payload.message || "图片上传失败。");
          }

          if (targetField) {
            targetField.value = payload.path;
            targetField.dispatchEvent(new Event("input", { bubbles: true }));
          }

          setStatus(`图片已上传并填入：${payload.path}。点击“保存并推送”后会发布到公网。`, "ok");
        } catch (error) {
          setStatus(`图片上传失败：${error.message}`, "error");
        }
      };

      const loadContent = async () => {
        try {
          const response = await fetch("/api/content", { cache: "no-store" });

          if (response.ok) {
            const payload = await response.json();
            content = payload.content;
            canPublish = true;
          } else {
            const fallback = await fetch(`site-content.json?_=${Date.now()}`, { cache: "no-store" });
            content = await fallback.json();
            canPublish = false;
          }

          fillFields();
          sendPreview();
          updatePublicRefreshLink();
          if (canPublish) {
            saveButton.disabled = false;
            publishButton.disabled = false;
            setStatus("内容已载入，可以直接编辑并查看右侧实时预览。保存并推送后会同步到 Netlify。", "ok");
          } else {
            saveButton.disabled = true;
            publishButton.disabled = true;
            setStatus("当前打开的是公网只读后台，只能临时编辑预览，不能保存或发布。请在本地项目目录运行 node admin-server.js 后打开 http://127.0.0.1:4315/admin.html。", "error");
          }
        } catch (error) {
          setStatus(`内容载入失败：${error.message}`, "error");
        }
      };

      const saveContent = async () => {
        if (!canPublish) {
          setStatus("当前是公网只读后台，无法保存。请使用本地后台：http://127.0.0.1:4315/admin.html", "error");
          return false;
        }

        collectFields();
        sendPreview();
        saveButton.disabled = true;
        publishButton.disabled = true;
        setStatus("正在保存内容...");

        try {
          const response = await fetch("/api/content", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ content }),
          });
          const payload = await response.json();

          if (!response.ok || !payload.ok) {
            throw new Error(payload.message || "保存失败。");
          }

          setStatus("内容已保存到 site-content.json。右侧预览已经是最新效果。", "ok");
          return true;
        } catch (error) {
          setStatus(`保存失败：请确认已经通过 node admin-server.js 启动后台服务。\n${error.message}`, "error");
          return false;
        } finally {
          saveButton.disabled = false;
          publishButton.disabled = false;
        }
      };

      const publishContent = async () => {
        if (!canPublish) {
          setStatus("当前是公网只读后台，无法发布。请先在本地运行 node admin-server.js，再打开本地后台。", "error");
          return;
        }

        const saved = await saveContent();

        if (!saved) {
          return;
        }

        publishButton.disabled = true;
        saveButton.disabled = true;
        setStatus("正在提交并同步部署到 Netlify 生产站...");

        try {
          const response = await fetch("/api/publish", { method: "POST" });
          const payload = await response.json();

          if (!response.ok || !payload.ok) {
            throw new Error(payload.message || "推送失败。");
          }

          updatePublicRefreshLink();
          setStatus(`${payload.message}\n\nNetlify 公网站通常会在几十秒内刷新。若没变化，点击右侧“强制刷新公网”。`, "ok");
        } catch (error) {
          setStatus(`推送失败：${error.message}`, "error");
        } finally {
          publishButton.disabled = false;
          saveButton.disabled = false;
        }
      };

      fields.forEach((field) => {
        field.addEventListener("input", schedulePreview);
      });

      uploadButtons.forEach((button) => {
        button.addEventListener("click", () => uploadImageForField(button.dataset.uploadTarget));
      });

      document.querySelectorAll(".tabs a").forEach((tab) => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".tabs a").forEach((item) => item.classList.remove("is-active"));
          tab.classList.add("is-active");
        });
      });

      previewFrame.addEventListener("load", () => {
        setTimeout(sendPreview, 120);
      });
      syncPreviewButton.addEventListener("click", schedulePreview);
      saveButton.addEventListener("click", saveContent);
      publishButton.addEventListener("click", publishContent);
      reloadPreviewButton.addEventListener("click", () => {
        previewFrame.src = `index.html?adminPreview=${Date.now()}`;
      });
      desktopButton.addEventListener("click", () => {
        previewCard.classList.remove("is-mobile");
      });
      mobileButton.addEventListener("click", () => {
        previewCard.classList.add("is-mobile");
      });
      loadContent();
    </script>
  </body>
</html>
